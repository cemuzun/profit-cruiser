services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: turo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: turo
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turo -d turo"]
      interval: 5s
      timeout: 3s
      retries: 20

  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://turo:${POSTGRES_PASSWORD}@postgres:5432/turo
      DATA_DIR: /data
      TZ: UTC
    volumes:
      - ./data:/data
    # Run cron in foreground; cron jobs invoke node scraper.mjs
    command: ["crond", "-f", "-l", "8"]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data:/srv/data:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
